# pyrefly.toml — second type checker, gated alongside `ty`.
#
# pyrefly runs in CI, pre-commit, and `scripts/full-lint.sh` (and on demand via
# `scripts/pyrefly.sh` / `uv run pyrefly check`). It must report 0 new findings
# vs `pyrefly-baseline.json` for the gate to pass. It is tuned here — via config,
# not inline comments — to suppress the structural noise buckets that Kivy's
# untyped, compiled codebase produces, so only real regressions fail the gate.

# Mirror ty.toml's environment: the six uv-workspace src roots + the app venv.
project-includes = [
    "src/barks-reader/src",
    "src/barks-fantagraphics/src",
    "src/barks-build-comic-images/src",
    "src/barks-kivy-ui/src",
    "src/comic-utils/src",
    "src/okf-reader/src",
]

search-path = [
    "src/barks-reader/src",
    "src/barks-fantagraphics/src",
    "src/barks-build-comic-images/src",
    "src/barks-kivy-ui/src",
    "src/comic-utils/src",
    "src/okf-reader/src",
]

project-excludes = [
    "**/experiments/**",
    "**/scraps/**",
    "**/__pycache__/**",
]

python-interpreter = ".venv/bin/python"

# Residual findings that are neither real bugs nor structurally suppressible are
# grandfathered here, so day-to-day runs report only NEW issues (0 today). This
# is ~90 Kivy-Optional attribute accesses (widget/app singletons Kivy populates
# at runtime but types `X | None`), plus a handful of ambiguous union-type and
# deferred-init annotations (several already `# ty: ignore`-ed). Refresh after
# intentionally changing the set with:  bash scripts/pyrefly.sh --update-baseline
baseline = "pyrefly-baseline.json"

# Kivy, OpenCV and Whoosh ship as compiled modules with no stubs (no py.typed,
# zero .pyi). ty silently treats them as Any; pyrefly needs to be told to. This
# clears the `missing-import` cascade on Kivy's Cython `.so` modules.
replace-imports-with-any = [
    "kivy.properties",
    "kivy.graphics",
    "kivy.graphics.*",
    "kivy._event",
    "kivy._clock",
    "kivy.weakproxy",
    "cv2",
    "whoosh",
    "whoosh.*",
    # Kivy annotates its `Window`/`Config` singletons as `WindowBase | None`, so
    # every `Window.bind(...)`, `Window.size`, `Config.getint(...)` reads as an
    # attribute access on a possibly-None value. pyrefly enforces that where ty
    # does not, producing ~200 false positives spread across the app. These are
    # untyped Kivy singletons regardless; treat their modules as Any (matches
    # ty's effective stance) rather than chasing a brittle per-file rule list.
    "kivy.core.window",
    "kivy.config",
]

# Override-shape mismatches against Kivy's *compiled* base classes (Widget,
# App, SettingItem, …). pyrefly can't see the real signatures of the .so bases,
# so every `on_touch_down`/`on_value`/`get_application_config`/`__events__`
# override reads as a mismatch. All are the Kivy stub gap, not real bugs;
# disable these kinds rather than grandfather a growing list per new widget.
# (This table must stay LAST — a TOML section header captures every key below
# it, so any top-level key placed after it would be parsed into [errors].)
[errors]
bad-override = false
bad-override-param-name = false
bad-override-mutable-attribute = false
inconsistent-inheritance = false
