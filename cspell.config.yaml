version: "0.2"
language: "en"

# Python source files only — same scope as ruff and ty
files:
  - "**/*.py"

# Respect .gitignore, then add ruff/ty-specific excludes
useGitignore: true
ignorePaths:
  - "**/experiments/**"
  - "**/scraps/**"
  - "**/benchmarks/**"
  - "**/pyarmor_runtime_000000/**"
  - "**/get_panel_bytes.py"

# Enable Python built-in dictionary plus word lists (global and per-package)
dictionaryDefinitions:
  - name: project
    path: "./cspell-words.txt"
    addWords: true
  - name: comic-utils
    path: "./src/comic-utils/cspell-words.txt"
    addWords: true
  - name: barks-fantagraphics
    path: "./src/barks-fantagraphics/cspell-words.txt"
    addWords: true
  - name: barks-reader
    path: "./src/barks-reader/cspell-words.txt"
    addWords: true

dictionaries:
  - python
  - project
  - comic-utils
  - barks-fantagraphics
  - barks-reader
