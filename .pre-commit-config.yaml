repos:
      - repo: https://github.com/astral-sh/ruff-pre-commit
        rev: v0.14.2 # Use the latest stable Ruff version
        hooks:
          - id: ruff-check # Runs the linter
            stages: [pre-commit]
#            args: [--fix] # Automatically fixes fixable issues
          - id: ruff-format # Applies formatting
            stages: [pre-commit]
      - repo: local
        hooks:
          - id: ty-check
            name: ty check
            entry: uv run ty check . # or python -m ty check if you don't use uv
            language: system
            types: [python]
            pass_filenames: false
            stages: [pre-commit]
          - id: pyrefly-check
            name: pyrefly check
            entry: uv run pyrefly check # 0 new vs pyrefly-baseline.json (see pyrefly.toml)
            language: system
            types: [python]
            pass_filenames: false
            stages: [pre-commit]
          - id: cspell
            name: cspell
            entry: bunx cspell --no-must-find-files
            language: system
            types: [python]
            stages: [pre-commit]
          - id: check-relative-imports
            name: check relative imports
            entry: bash scripts/check-relative-imports.sh
            language: system
            types: [python]
            pass_filenames: false
            stages: [pre-commit]
          - id: lint-imports
            name: lint-imports (import-linter contracts)
            entry: uv run lint-imports
            language: system
            types: [python]
            pass_filenames: false
            stages: [pre-commit]
          - id: pytest
            name: pytest (full suite)
            entry: uv run pytest
            language: system
            pass_filenames: false
            always_run: true
            stages: [pre-push]
          - id: cspell-commit-msg
            name: cspell commit message
            entry: bunx cspell --no-must-find-files
            language: system
            stages: [commit-msg]
