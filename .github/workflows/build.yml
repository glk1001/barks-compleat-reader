name: Build Verification

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  # Opt in early to Node 24 for JS actions. Silences the deprecation warning
  # emitted for actions/cache@v4 and actions/upload-artifact@v4, which still
  # declare Node 20 as their runtime. Safe to remove once those actions ship
  # new majors that declare Node 24 natively.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            exe: barks-reader-linux
          - os: macos-latest
            exe: barks-reader-macos
          - os: macos-15-intel
            exe: barks-reader-macos-x64
            deploy_target: "12.0"
          - os: windows-latest
            exe: barks-reader-win.exe
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write  # Needed to create/update releases on tag pushes.
    env:
      BARKS_ZIPS_KEY: ${{ secrets.BARKS_ZIPS_KEY }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history for git describe
          # Don't fetch LFS here — do it below with a cache layer to avoid
          # burning through the 1GB/month LFS bandwidth quota (cpi.db is 65MB).

      - name: Build LFS object list (for cache key)
        shell: bash
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Cache LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs/objects
          key: lfs-${{ runner.os }}-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: |
            lfs-${{ runner.os }}-

      - name: Fetch LFS files
        shell: bash
        run: |
          git lfs pull
          rm -f .lfs-assets-id

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libmtdev1t64

      - name: Set macOS deployment target
        if: matrix.deploy_target
        shell: bash
        run: echo "MACOSX_DEPLOYMENT_TARGET=${{ matrix.deploy_target }}" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Build panel module (Cython, real)
        if: env.BARKS_ZIPS_KEY != ''
        shell: bash
        run: bash scripts/cythonize-panel-module.sh

      - name: Build panel module (stub fallback for fork PRs)
        if: env.BARKS_ZIPS_KEY == ''
        shell: bash
        run: |
          cat > src/comic-utils/src/comic_utils/get_panel_bytes.py <<'STUB'
          def get_decrypted_bytes(data: bytes) -> bytes | None:
              return data
          STUB

      - name: Build executable
        shell: bash
        run: bash scripts/build.sh

      - name: Upload executable
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.exe }}
          path: ${{ matrix.exe }}
          if-no-files-found: error
          retention-days: 14

      - name: Attach to GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/') && env.BARKS_ZIPS_KEY != ''
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.exe }}
          fail_on_unmatched_files: true
          draft: true
