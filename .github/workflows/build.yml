name: Build Verification

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  # Opt in early to Node 24 for JS actions. Silences the deprecation warning
  # emitted for actions/cache@v4 and actions/upload-artifact@v4, which still
  # declare Node 20 as their runtime. Safe to remove once those actions ship
  # new majors that declare Node 24 natively.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            exe: barks-reader-linux
          # On macOS the build produces a zipped .app bundle (pyobjc/Foundation
          # requires an app bundle, so Nuitka's --mode=app is used; see build.sh).
          - os: macos-latest
            exe: barks-reader-macos.zip
          - os: macos-15-intel
            exe: barks-reader-macos-x64.zip
            deploy_target: "12.0"
          - os: windows-latest
            exe: barks-reader-win.exe
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      BARKS_ZIPS_KEY: ${{ secrets.BARKS_ZIPS_KEY }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history for git describe
          # Don't fetch LFS here — do it below with a cache layer to avoid
          # burning through the 1GB/month LFS bandwidth quota (cpi.db is 65MB).

      - name: Build LFS object list (for cache key)
        shell: bash
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Cache LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs/objects
          key: lfs-${{ runner.os }}-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: |
            lfs-${{ runner.os }}-

      - name: Fetch LFS files
        shell: bash
        run: |
          git lfs pull
          rm -f .lfs-assets-id

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libmtdev1t64 patchelf ccache

      - name: Install ccache (macOS)
        if: runner.os == 'macOS'
        run: brew install ccache

      - name: Set macOS deployment target
        if: matrix.deploy_target
        shell: bash
        run: echo "MACOSX_DEPLOYMENT_TARGET=${{ matrix.deploy_target }}" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Generate panel module (real, from secret)
        if: env.BARKS_ZIPS_KEY != ''
        shell: bash
        run: bash scripts/generate-panel-module.sh

      - name: Generate panel module (stub fallback for fork PRs)
        if: env.BARKS_ZIPS_KEY == ''
        shell: bash
        run: |
          cat > src/comic-utils/src/comic_utils/get_panel_bytes.py <<'STUB'
          def get_decrypted_bytes(data: bytes) -> bytes | None:
              return data
          STUB

      - name: Cache Nuitka build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Nuitka
            ~/Library/Caches/Nuitka
            ~\AppData\Local\Nuitka\Nuitka\Cache
          # The key must be unique per run: actions/cache never re-saves on an exact
          # primary-key hit, and the Nuitka/ccache object cache changes with every
          # source change. restore-keys provides the nearest previous cache.
          # runner.arch is in the key because runner.os alone is "macOS" for BOTH mac
          # legs - they would race for one key per run (loser's save is rejected) and
          # cross-restore each other's useless wrong-architecture object caches.
          key: nuitka-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('uv.lock') }}-${{ github.run_id }}
          restore-keys: |
            nuitka-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('uv.lock') }}-
            nuitka-${{ runner.os }}-${{ runner.arch }}-
            nuitka-${{ runner.os }}-${{ hashFiles('uv.lock') }}-

      - name: Build executable
        shell: bash
        run: bash scripts/build.sh

      - name: Upload executable
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.exe }}
          path: ${{ matrix.exe }}
          if-no-files-found: error
          retention-days: 14

  # On an app tag push (v*, not data-v*), assemble ONE draft release from all
  # four build artifacts. A single job avoids the duplicate-draft race that
  # per-matrix-leg release steps are prone to. The draft is never published
  # automatically - review it on the Releases page and click "Publish release".
  release:
    name: Assemble draft release
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !env.ACT }}
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to create/update the draft release.
    steps:
      - name: Download built executables
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          # A semver pre-release suffix in the tag (v1.2.3-alpha.1) marks the
          # release as a pre-release; a plain v1.2.3 becomes a full release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/barks-reader-linux
            dist/barks-reader-macos.zip
            dist/barks-reader-macos-x64.zip
            dist/barks-reader-win.exe
          fail_on_unmatched_files: true
          # The ~1GB data packs rarely change, so they live on their own
          # dedicated release (data-v*) instead of being duplicated onto
          # every app release. Keep these links pointing at the newest one.
          body: |
            Download the executable for your platform (listed below), plus the two
            data packs - needed on first install, unchanged between most releases:

            - [barks-reader-data-1.zip](https://github.com/glk1001/barks-compleat-reader/releases/download/data-v1/barks-reader-data-1.zip)
            - [barks-reader-data-2.zip](https://github.com/glk1001/barks-compleat-reader/releases/download/data-v1/barks-reader-data-2.zip)
