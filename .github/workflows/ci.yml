name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Generate stubs for gitignored modules
        run: |
          cat > src/barks-reader/src/barks_reader/_version.py <<'STUB'
          COPYRIGHT_YEARS = "2025"
          VERSION = "ci"
          STUB
          cat > src/comic-utils/src/comic_utils/get_panel_bytes.py <<'STUB'
          def get_decrypted_bytes(data: bytes) -> bytes:
              return data
          STUB

      - name: Type check with ty
        # Ignore unused-ignore-comment: ty: ignore[unresolved-import] comments are needed
        # locally (Pyarmor-encrypted source) but become unused here (plain stubs).
        run: uv run ty check --ignore unused-ignore-comment

  import-layering:
    name: Import Layering
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Check import layering
        run: uv run lint-imports

  spell-check:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Spell check
        run: bunx cspell

  test:
    name: Test (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libmtdev1t64 xvfb

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Generate stubs for gitignored modules
        shell: bash
        run: |
          cat > src/barks-reader/src/barks_reader/_version.py <<'STUB'
          COPYRIGHT_YEARS = "2025"
          VERSION = "ci"
          STUB
          cat > src/comic-utils/src/comic_utils/get_panel_bytes.py <<'STUB'
          def get_decrypted_bytes(data: bytes) -> bytes:
              return data
          STUB

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum uv run pytest

      - name: Run tests (macOS/Windows)
        if: runner.os != 'Linux'
        run: uv run pytest
